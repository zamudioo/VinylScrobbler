<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VinylScrobbler · Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #080809;
  --surface:   #0f0f11;
  --surface2:  #161619;
  --surface3:  #1e1e22;
  --border:    #252529;
  --border2:   #2e2e34;
  --accent:    #e8143e;
  --accent-lo: rgba(232,20,62,.08);
  --accent-md: rgba(232,20,62,.18);
  --accent2:   #ff3d5e;
  --text:      #f2f0ec;
  --text2:     #a09e9a;
  --text3:     #5c5a57;
  --green:     #22c55e;
  --green-lo:  rgba(34,197,94,.1);
  --r:         12px;
  --r-lg:      16px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: "Syne", sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: .022;
  pointer-events: none;
  z-index: 999;
}

body::after {
  content: "";
  position: fixed;
  width: 800px; height: 500px;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  background: radial-gradient(ellipse, rgba(232,20,62,.05) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

/* ── Header / Now Playing ── */
#nowHero {
  position: sticky; top: 0; z-index: 90;
}

.hero-bar {
  display: flex; align-items: center;
  padding: 0 28px;
  height: 58px;
  background: rgba(8,8,9,.9);
  backdrop-filter: blur(24px) saturate(160%);
  border-bottom: 1px solid var(--border);
  gap: 16px;
  position: relative; z-index: 2;
}

.logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; font-weight: 800;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--text);
  flex-shrink: 0;
  text-decoration: none;
}
.logo-vinyl {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, #18181c 0%, #28282e 25%, #18181c 50%, #28282e 75%, #18181c 100%);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-vinyl::after {
  content: "";
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
}
.logo-vinyl.spinning { animation: spin 2s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.hero-now {
  flex: 1; min-width: 0;
  display: flex; align-items: center; gap: 9px;
}
.hero-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text3); flex-shrink: 0;
  transition: background .4s, box-shadow .4s;
}
.hero-dot.live {
  background: var(--green);
  box-shadow: 0 0 7px var(--green);
  animation: livepulse 1.6s ease-in-out infinite;
}
@keyframes livepulse { 0%,100%{opacity:1} 50%{opacity:.25} }

.hero-nowtext {
  font-size: 12px; font-weight: 500;
  color: var(--text3);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: color .4s;
  letter-spacing: .02em;
}
.hero-nowtext.live { color: var(--text2); }

.det-toggle {
  display: flex; align-items: center; gap: 8px;
  font-size: 10px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--text3);
  user-select: none; flex-shrink: 0;
  transition: color .2s;
}
.det-toggle.active { color: var(--green); }
.switch { position: relative; width: 34px; height: 18px; flex-shrink: 0; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute; inset: 0;
  background: var(--surface3); border: 1px solid var(--border2);
  border-radius: 18px; cursor: pointer;
  transition: all .25s;
}
.slider::before {
  content: "";
  position: absolute;
  width: 12px; height: 12px; left: 2px; top: 2px;
  border-radius: 50%; background: var(--text3);
  transition: transform .25s, background .25s;
}
.switch input:checked + .slider { background: var(--green-lo); border-color: var(--green); }
.switch input:checked + .slider::before { transform: translateX(16px); background: var(--green); }

/* Now Playing expanded */
.hero-expanded {
  max-height: 0; overflow: hidden;
  transition: max-height .5s cubic-bezier(.22,1,.36,1);
  position: relative;
}
.hero-expanded.open { max-height: 160px; }
.hero-cover-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  filter: blur(50px) brightness(.25) saturate(2.5);
  transform: scale(1.15);
}
.hero-content {
  position: relative; z-index: 1;
  display: flex; align-items: center; gap: 18px;
  padding: 16px 28px;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.hero-art {
  width: 90px; height: 90px;
  border-radius: 9px; object-fit: cover;
  box-shadow: 0 8px 32px rgba(0,0,0,.7);
  flex-shrink: 0; background: var(--surface3);
}
.hero-info { min-width: 0; }
.hero-info .now-label {
  font-size: 9px; font-weight: 700; letter-spacing: .18em;
  text-transform: uppercase; color: var(--accent); margin-bottom: 5px;
}
.hero-info .now-title {
  font-family: "Cormorant Garamond", serif;
  font-size: 26px; font-weight: 600; line-height: 1.1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.hero-info .now-artist {
  font-size: 13px; color: var(--text2); margin-top: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.hero-info .now-album {
  font-family: "JetBrains Mono", monospace;
  font-size: 11px; color: var(--text3); margin-top: 5px;
}

/* ── Main layout ── */
main {
  max-width: 1160px;
  margin: 0 auto;
  padding: 36px 24px 100px;
  position: relative; z-index: 1;
}

/* Period tabs */
.period-bar {
  display: flex; gap: 0;
  margin-bottom: 36px;
  border-bottom: 1px solid var(--border);
}
.period-btn {
  padding: 8px 16px 10px;
  border: none; border-bottom: 2px solid transparent;
  background: transparent; color: var(--text3);
  font-family: "Syne", sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  cursor: pointer;
  transition: color .2s, border-color .2s;
  margin-bottom: -1px;
}
.period-btn:hover { color: var(--text2); }
.period-btn.active { color: var(--text); border-bottom-color: var(--accent); }

/* Summary grid */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px; margin-bottom: 36px;
}
@media (max-width: 700px) { .summary-grid { grid-template-columns: 1fr 1fr; } }

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 22px 20px;
  position: relative; overflow: hidden;
  transition: border-color .25s, transform .25s;
  animation: fadeUp .5s ease both;
}
.stat-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.stat-card::after {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.05), transparent);
}
.stat-card:nth-child(1) { animation-delay:.05s }
.stat-card:nth-child(2) { animation-delay:.10s }
.stat-card:nth-child(3) { animation-delay:.15s }
.stat-card:nth-child(4) { animation-delay:.20s }
.stat-label {
  font-size: 9px; font-weight: 700; letter-spacing: .14em;
  text-transform: uppercase; color: var(--text3); margin-bottom: 10px;
}
.stat-value {
  font-size: 40px; font-weight: 800; line-height: 1; letter-spacing: -.03em;
}

/* Content grids */
.grid-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px; margin-bottom: 10px;
}
.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 10px;
}
@media (max-width: 960px) { .grid-3 { grid-template-columns: 1fr 1fr; } }
@media (max-width: 700px) { .grid-3, .grid-2 { grid-template-columns: 1fr; } }

/* Card */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
  position: relative;
  animation: fadeUp .5s ease both;
  animation-delay: .2s;
}
.card::after {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.04), transparent);
  pointer-events: none;
}
.card-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--border);
}
.card-head h2 {
  font-size: 9px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase; color: var(--text3);
}

/* Ranked list */
.rank-item {
  display: flex; align-items: center; gap: 11px;
  padding: 7px 16px;
  transition: background .12s;
}
.rank-item:hover { background: var(--surface2); }
.rank-num {
  font-family: "JetBrains Mono", monospace;
  font-size: 10px; color: var(--text3);
  width: 16px; text-align: right; flex-shrink: 0;
}
.rank-cover {
  width: 36px; height: 36px;
  border-radius: 6px; object-fit: cover;
  background: var(--surface3); flex-shrink: 0;
}
.rank-cover.circle { border-radius: 50%; }
.rank-info { flex: 1; min-width: 0; }
.rank-name {
  font-size: 13px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rank-sub {
  font-family: "JetBrains Mono", monospace;
  font-size: 10px; color: var(--text3); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rank-plays {
  font-family: "JetBrains Mono", monospace;
  font-size: 10px; color: var(--text3); flex-shrink: 0;
}

/* Genres */
.genre-list { padding: 12px 16px 16px; display: flex; flex-direction: column; gap: 11px; }
.genre-label {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 4px;
}
.genre-label span:first-child { font-size: 12px; font-weight: 600; }
.genre-label span:last-child {
  font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--text3);
}
.genre-track { height: 3px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
.genre-fill {
  height: 100%; border-radius: 2px; width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width .9s cubic-bezier(.22,1,.36,1);
}

/* Quick stats */
.qs-item {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.qs-item:last-child { border-bottom: none; }
.qs-label {
  font-size: 9px; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; color: var(--text3); margin-bottom: 3px;
}
.qs-val {
  font-size: 14px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* History */
.history-section { margin-top: 10px; }
.history-head {
  padding: 0 2px; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.history-head h2 {
  font-size: 9px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase; color: var(--text3);
}

.history-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
  position: relative;
}
.history-card::after {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.04), transparent);
  pointer-events: none;
}

.h-row {
  display: grid;
  grid-template-columns: 42px 1fr minmax(0,160px) auto 90px 28px;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  transition: background .12s;
}
.h-row:last-child { border-bottom: none; }
.h-row:hover { background: var(--surface2); }
@media (max-width: 700px) {
  .h-row { grid-template-columns: 38px 1fr auto 28px; }
  .h-album, .h-badge-wrap { display: none; }
}

.h-art {
  width: 36px; height: 36px;
  border-radius: 6px; object-fit: cover;
  background: var(--surface3); flex-shrink: 0;
}
.h-info { min-width: 0; }
.h-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.h-artist {
  font-family: "JetBrains Mono", monospace;
  font-size: 10px; color: var(--text3); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.h-album {
  font-size: 11px; color: var(--text3);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.h-badge {
  display: inline-block;
  padding: 2px 8px; border-radius: 100px;
  background: var(--surface3); border: 1px solid var(--border2);
  font-size: 9px; font-weight: 700; letter-spacing: .06em;
  color: var(--text3); white-space: nowrap;
}
.h-time {
  font-family: "JetBrains Mono", monospace;
  font-size: 10px; color: var(--text3); white-space: nowrap;
}
.btn-del {
  width: 24px; height: 24px; border-radius: 5px;
  border: none; background: transparent; color: var(--text3);
  font-size: 12px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: background .15s, color .15s, opacity .15s;
}
.h-row:hover .btn-del { opacity: 1; }
.btn-del:hover { background: var(--accent-md); color: var(--accent2); }

/* Load more */
.load-more-wrap { text-align: center; margin-top: 18px; }
.btn-ghost {
  padding: 8px 28px; border: 1px solid var(--border2);
  border-radius: 100px; background: transparent;
  color: var(--text3);
  font-family: "Syne", sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  cursor: pointer; transition: all .2s;
}
.btn-ghost:hover { border-color: var(--text2); color: var(--text); }

.empty {
  text-align: center; padding: 32px;
  color: var(--text3); font-size: 11px;
  font-family: "JetBrains Mono", monospace; letter-spacing: .04em;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div id="nowHero">
  <div class="hero-bar">
    <a class="logo" href="/">
      <div class="logo-vinyl" id="logoVinyl"></div>
      VinylScrobbler
    </a>
    <div class="hero-now">
      <div class="hero-dot" id="heroDot"></div>
      <span class="hero-nowtext" id="heroNowText">Idle</span>
    </div>
    <label class="det-toggle active" id="detToggle">
      <span id="detLabel">Recording</span>
      <div class="switch">
        <input type="checkbox" id="detSwitch" checked>
        <span class="slider"></span>
      </div>
    </label>
  </div>
  <div class="hero-expanded" id="heroExpanded">
    <div class="hero-cover-bg" id="heroCoverBg"></div>
    <div class="hero-content">
      <img class="hero-art" id="heroArt" src="" alt="">
      <div class="hero-info">
        <div class="now-label">Now Playing</div>
        <div class="now-title" id="heroTitle">—</div>
        <div class="now-artist" id="heroArtistName">—</div>
        <div class="now-album" id="heroAlbum"></div>
      </div>
    </div>
  </div>
</div>

<main>

  <div class="period-bar" id="periodBar">
    <button class="period-btn" data-period="today">Today</button>
    <button class="period-btn active" data-period="week">This week</button>
    <button class="period-btn" data-period="month">Month</button>
    <button class="period-btn" data-period="year">Year</button>
    <button class="period-btn" data-period="all">All time</button>
  </div>

  <div class="summary-grid">
    <div class="stat-card">
      <div class="stat-label">Playcount</div>
      <div class="stat-value" id="sPlays">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Listening time</div>
      <div class="stat-value" id="sTime">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Artists</div>
      <div class="stat-value" id="sArtists">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Albums</div>
      <div class="stat-value" id="sAlbums">—</div>
    </div>
  </div>

  <div class="grid-3">
    <div class="card">
      <div class="card-head"><h2>Top Artists</h2></div>
      <div id="artistList"><div class="empty">Loading…</div></div>
    </div>
    <div class="card">
      <div class="card-head"><h2>Top Tracks</h2></div>
      <div id="trackList"><div class="empty">Loading…</div></div>
    </div>
    <div class="card">
      <div class="card-head"><h2>Top Albums</h2></div>
      <div id="albumList"><div class="empty">Loading…</div></div>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-head"><h2>Genres</h2></div>
      <div id="genreList"><div class="empty">Loading…</div></div>
    </div>
    <div class="card" style="align-self:start">
      <div class="card-head"><h2>Highlights</h2></div>
      <div id="quickStats"><div class="empty">Loading…</div></div>
    </div>
  </div>

  <div class="history-section">
    <div class="history-head"><h2>Recent plays</h2></div>
    <div class="history-card">
      <div id="historyBody"><div class="empty">Loading…</div></div>
    </div>
    <div class="load-more-wrap">
      <button class="btn-ghost" id="loadMoreBtn" style="display:none">Load more</button>
    </div>
  </div>

</main>

<script>
const API = window.location.origin;
let currentPeriod = "week";
let historyPage = 1;
let historyTotal = 0;
const HISTORY_LIMIT = 50;

function fmtTimeShort(s) {
  if (!s) return "0m";
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
  if (h >= 24) return `${Math.floor(h/24)}d`;
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

function timeAgo(ts) {
  const diff = Date.now()/1000 - ts;
  if (diff < 60)    return "just now";
  if (diff < 3600)  return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return new Date(ts*1000).toLocaleDateString("es", {day:"numeric",month:"short"});
}

function esc(s) {
  if (!s) return "";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function art(url, cls) {
  return url
    ? `<img src="${esc(url)}" class="${cls}" onerror="this.src='';this.style.background='var(--surface3)'">`
    : `<div class="${cls}"></div>`;
}

// ── Now Playing ────────────────────────────────────────────────────────────────
function setNowPlaying(track) {
  const dot      = document.getElementById("heroDot");
  const nowTxt   = document.getElementById("heroNowText");
  const expanded = document.getElementById("heroExpanded");
  const vinyl    = document.getElementById("logoVinyl");

  if (track) {
    dot.classList.add("live");
    nowTxt.classList.add("live");
    nowTxt.textContent = `${track.artist} — ${track.title}`;
    vinyl.classList.add("spinning");

    document.getElementById("heroTitle").textContent      = track.title  || "—";
    document.getElementById("heroArtistName").textContent = track.artist || "—";
    document.getElementById("heroAlbum").textContent      = track.album  || "";

    const coverUrl = track.cover || "";
    document.getElementById("heroArt").src = coverUrl;
    document.getElementById("heroCoverBg").style.backgroundImage = coverUrl ? `url('${coverUrl}')` : "none";
    expanded.classList.add("open");
  } else {
    dot.classList.remove("live");
    nowTxt.classList.remove("live");
    nowTxt.textContent = "Idle";
    vinyl.classList.remove("spinning");
    expanded.classList.remove("open");
  }
}

function connectWS() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  const ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onmessage = e => {
    const d = JSON.parse(e.data);
    setNowPlaying(d.status === "playing" ? d.track : null);
  };
  ws.onclose = () => setTimeout(connectWS, 5000);
}

fetch(`${API}/api/now`).then(r=>r.json()).then(d => {
  if (d.status === "playing") setNowPlaying(d.track);
}).catch(()=>{});
connectWS();

// ── Renders ────────────────────────────────────────────────────────────────────
function renderArtists(list) {
  if (!list.length) return `<div class="empty">No data</div>`;
  return list.map((a,i) => `
    <div class="rank-item">
      <span class="rank-num">${i+1}</span>
      ${art(a.cover_url, "rank-cover circle")}
      <div class="rank-info"><div class="rank-name">${esc(a.artist)}</div></div>
      <span class="rank-plays">${a.plays}×</span>
    </div>`).join("");
}

function renderTracks(list) {
  if (!list.length) return `<div class="empty">No data</div>`;
  return list.map((t,i) => `
    <div class="rank-item">
      <span class="rank-num">${i+1}</span>
      ${art(t.cover_url, "rank-cover")}
      <div class="rank-info">
        <div class="rank-name">${esc(t.title)}</div>
        <div class="rank-sub">${esc(t.artist)}</div>
      </div>
      <span class="rank-plays">${t.plays}×</span>
    </div>`).join("");
}

function renderAlbums(list) {
  if (!list.length) return `<div class="empty">No data</div>`;
  return list.map((a,i) => `
    <div class="rank-item">
      <span class="rank-num">${i+1}</span>
      ${art(a.cover_url, "rank-cover")}
      <div class="rank-info">
        <div class="rank-name">${esc(a.album)}</div>
        <div class="rank-sub">${esc(a.artist)}</div>
      </div>
      <span class="rank-plays">${a.plays}×</span>
    </div>`).join("");
}

function renderGenres(list) {
  if (!list.length) return `<div class="empty">No genre data</div>`;
  const max = list[0].plays;
  return `<div class="genre-list">${list.map(g => `
    <div>
      <div class="genre-label">
        <span>${esc(g.genre)}</span>
        <span>${g.plays} plays</span>
      </div>
      <div class="genre-track">
        <div class="genre-fill" data-w="${(g.plays/max*100).toFixed(1)}"></div>
      </div>
    </div>`).join("")}</div>`;
}

function renderHighlights(data) {
  const topArtist = data.top_artists[0];
  const topTrack  = data.top_tracks[0];
  const avgMap    = {today:1, week:7, month:30, year:365};
  const avg       = avgMap[data.period]
    ? (data.total_plays / avgMap[data.period]).toFixed(1)
    : "—";
  const rows = [
    ["Top artist",    topArtist ? topArtist.artist : "—"],
    ["Top track",     topTrack  ? topTrack.title   : "—"],
    ["Avg / day",     avg],
    ["Genres logged", data.genres.length || 0],
  ];
  return rows.map(([l,v]) => `
    <div class="qs-item">
      <div class="qs-label">${l}</div>
      <div class="qs-val">${esc(String(v))}</div>
    </div>`).join("");
}

function renderHistoryRows(plays) {
  return plays.map(p => `
    <div class="h-row" data-id="${p.id}">
      ${art(p.cover_url, "h-art")}
      <div class="h-info">
        <div class="h-title">${esc(p.title||"—")}</div>
        <div class="h-artist">${esc(p.artist||"—")}</div>
      </div>
      <div class="h-album">${esc(p.album||"—")}</div>
      <div class="h-badge-wrap">${p.genre ? `<span class="h-badge">${esc(p.genre)}</span>` : ""}</div>
      <span class="h-time">${timeAgo(p.timestamp)}</span>
      <button class="btn-del" title="Delete" onclick="deletePlay(${p.id},this)">✕</button>
    </div>`).join("");
}

// ── Load data ──────────────────────────────────────────────────────────────────
async function loadSummary(period) {
  try {
    const data = await fetch(`${API}/api/stats/summary?period=${period}`).then(r=>r.json());

    document.getElementById("sPlays").textContent   = data.total_plays.toLocaleString("es");
    document.getElementById("sTime").textContent    = fmtTimeShort(data.total_seconds);
    document.getElementById("sArtists").textContent = data.top_artists.length === 10 ? "10+" : data.top_artists.length;
    document.getElementById("sAlbums").textContent  = data.top_albums.length  === 10 ? "10+" : data.top_albums.length;

    document.getElementById("artistList").innerHTML  = renderArtists(data.top_artists);
    document.getElementById("trackList").innerHTML   = renderTracks(data.top_tracks);
    document.getElementById("albumList").innerHTML   = renderAlbums(data.top_albums);
    document.getElementById("quickStats").innerHTML  = renderHighlights(data);
    document.getElementById("genreList").innerHTML   = renderGenres(data.genres);

    requestAnimationFrame(() => {
      document.querySelectorAll(".genre-fill[data-w]").forEach(el => {
        el.style.width = el.dataset.w + "%";
      });
    });
  } catch(e) { console.error("Summary error:", e); }
}

async function loadHistory(page=1, append=false) {
  try {
    const data = await fetch(`${API}/api/stats/history?page=${page}&limit=${HISTORY_LIMIT}`).then(r=>r.json());
    historyTotal = data.total;
    const body = document.getElementById("historyBody");
    if (!append) {
      body.innerHTML = data.plays.length
        ? renderHistoryRows(data.plays)
        : `<div class="empty">No plays yet. Put a record on.</div>`;
    } else {
      body.insertAdjacentHTML("beforeend", renderHistoryRows(data.plays));
    }
    const btn = document.getElementById("loadMoreBtn");
    btn.style.display = page * HISTORY_LIMIT < historyTotal ? "inline-block" : "none";
  } catch(e) { console.error("History error:", e); }
}

// ── Delete ─────────────────────────────────────────────────────────────────────
async function deletePlay(id, btn) {
  btn.disabled = true;
  try {
    const res = await fetch(`${API}/api/history/${id}`, { method: "DELETE" });
    if (res.ok) {
      const row = document.querySelector(`.h-row[data-id="${id}"]`);
      if (row) {
        row.style.transition = "opacity .18s, padding .25s, max-height .25s";
        row.style.opacity = "0";
        row.style.maxHeight = "0";
        row.style.padding = "0";
        row.style.overflow = "hidden";
        setTimeout(() => row.remove(), 260);
      }
      historyTotal--;
    }
  } catch(e) { btn.disabled = false; }
}

// ── Detection toggle ───────────────────────────────────────────────────────────
document.getElementById("detSwitch").addEventListener("change", async (e) => {
  const toggle = document.getElementById("detToggle");
  const label  = document.getElementById("detLabel");
  try {
    const data = await fetch(`${API}/api/detection/toggle`, { method:"POST" }).then(r=>r.json());
    const on   = data.enabled;
    e.target.checked = on;
    toggle.classList.toggle("active", on);
    label.textContent = on ? "Recording" : "Paused";
    if (!on) setNowPlaying(null);
  } catch(err) { e.target.checked = !e.target.checked; }
});

fetch(`${API}/api/detection`).then(r=>r.json()).then(d => {
  const on = d.enabled;
  document.getElementById("detSwitch").checked = on;
  document.getElementById("detToggle").classList.toggle("active", on);
  document.getElementById("detLabel").textContent = on ? "Recording" : "Paused";
}).catch(()=>{});

// ── Period tabs ────────────────────────────────────────────────────────────────
document.getElementById("periodBar").addEventListener("click", e => {
  const btn = e.target.closest(".period-btn");
  if (!btn) return;
  document.querySelectorAll(".period-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentPeriod = btn.dataset.period;
  loadSummary(currentPeriod);
});

document.getElementById("loadMoreBtn").addEventListener("click", () => {
  historyPage++;
  loadHistory(historyPage, true);
});

loadSummary(currentPeriod);
loadHistory(1);

setInterval(() => {
  loadSummary(currentPeriod);
  if (historyPage === 1) loadHistory(1);
}, 60_000);
</script>
</body>
